name: Build Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-tauri:
    name: Build (${{ matrix.platform }}${{ matrix.args != '' && ' - ' || '' }}${{ matrix.args }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            target: 'universal-apple-darwin'
            arch: 'universal'
            path: 'target/universal-apple-darwin/release/bundle/**'
          - platform: 'windows-latest'
            args: ''
            target: ''
            arch: 'x64'
            path: 'target/release/bundle/**'
          - platform: 'windows-latest'
            args: '--target aarch64-pc-windows-msvc'
            target: 'aarch64-pc-windows-msvc'
            arch: 'arm64'
            path: 'target/aarch64-pc-windows-msvc/release/bundle/**'
          - platform: 'ubuntu-latest'
            args: ''
            target: ''
            arch: 'x64'
            path: 'target/release/bundle/**'
          - platform: 'ubuntu-24.04-arm'
            args: ''
            target: ''
            arch: 'arm64'
            path: 'target/release/bundle/**'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install macOS targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Windows ARM64 target
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: rustup target add aarch64-pc-windows-msvc

      - name: Build Frontend
        run: |
          npx svelte-kit sync
          npm run build

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'CAB v__VERSION__'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cab-desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.path }}
          if-no-files-found: warn
