name: Build Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  prepare-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate release notes
        run: ./scripts/generate-release-body.sh "${{ github.ref_name }}"

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" \
              --title "CAB ${{ github.ref_name }}" \
              --notes-file .github/release-body.md
          else
            gh release create "${{ github.ref_name }}" \
              --draft \
              --title "CAB ${{ github.ref_name }}" \
              --notes-file .github/release-body.md
          fi

  build-tauri:
    needs: prepare-release
    if: always() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped')
    name: Build (${{ matrix.platform }}${{ matrix.args != '' && ' - ' || '' }}${{ matrix.args }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
            arch: 'x64'
            cargo_target: 'x86_64-apple-darwin'
            path: 'target/x86_64-apple-darwin/release/bundle/**'
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
            arch: 'arm64'
            cargo_target: 'aarch64-apple-darwin'
            path: 'target/aarch64-apple-darwin/release/bundle/**'
          - platform: 'windows-latest'
            args: ''
            target: ''
            arch: 'x64'
            cargo_target: ''
            path: 'target/release/bundle/**'
          - platform: 'windows-latest'
            args: '--target aarch64-pc-windows-msvc'
            target: 'aarch64-pc-windows-msvc'
            arch: 'arm64'
            cargo_target: ''
            path: 'target/aarch64-pc-windows-msvc/release/bundle/**'
          - platform: 'ubuntu-latest'
            args: ''
            target: ''
            arch: 'x64'
            cargo_target: ''
            path: 'target/release/bundle/**'
          - platform: 'ubuntu-24.04-arm'
            args: ''
            target: ''
            arch: 'arm64'
            cargo_target: ''
            path: 'target/release/bundle/**'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install macOS target
        if: matrix.platform == 'macos-latest'
        run: rustup target add ${{ matrix.cargo_target }}

      - name: Install Windows ARM64 target
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: rustup target add aarch64-pc-windows-msvc

      - name: Build Frontend
        run: |
          npx svelte-kit sync
          vp build

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CAB_CARGO_TARGET: ${{ matrix.cargo_target }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CAB ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cab-gui-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.path }}
          if-no-files-found: warn
